<html>
	<head>
		<title>Sample Website</title>
		<style>
			table,th,td{
				border : 1px solid black;
			}
			.f1{
				display: flex;
				justify-content :center;
				margin : 25px;
			}
			h1{
				text-align : center;
			}
		</style>
	</head>
	<body>
		
		<h1>Registration Form</h1>
		<form class="f1">
		<table>
			<tr>
			</tr>
			<tr>
				<th>Name</th>
				<td><input type="text" placeholder="Enter Your Name"></td>
			</tr>
			<tr>
				<th>Age</th>
				<td><input type="number" placeholder="Enter Your Age"></td>
			</tr>
			<tr>
				<th>Email</th>
				<td><input type="email" placeholder="Enter Your Email"></td>
			</tr>
			<tr>
				<th>Address</th>
				<td><input type="text" placeholder="Enter Your Address" rowspan></td>
			</tr>
			<tr>
				<th>Gender</th>
				<td><label><input type="radio" name="Gender" value="Male">Male</label><label><input type="radio" name="Gender" value="Female">Female</label></td>
			</tr>
			<tr>
				<th>Password</th>
				<td><input type="password" placeholder="Enter Your Password"></td>
			</tr>
			<tr><th><td><input type="submit"></td></th></tr>
		</table>
			
		</form>
	</body>
</html>
