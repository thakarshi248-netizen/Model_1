<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        body{
            background-color: bisque;
        }
        .i1{
            height: 280px;
            position: absolute ;
            
        }
        .i2{
            height: 200px;
        }
        .i3{
            height: 160px;
            width: 160px;
            border-radius: 120px;
        }
        .t{
            color: rgb(59, 42, 34);
            font-family: sans-serif;
            font-size: 60px;
            font-weight: 10;
        }
        .R1{
            height: 130px;
            width: 130px;
            border-radius: 150px;
            background-color: darkgoldenrod;
        }
        .R2{
            height: 170px;
            width: 170px;
            border-radius: 250px;
            background-color: rgba(151, 39, 39, 0.36);
            margin-top: 10%;
        }
        image{
            position: relative;
        }
        .content{
            padding: 10px;
            display: flex;
            justify-content: space-around;
            height: 500px;
            align-items: center;
        }
        .D2{
            width: 50%;
            text-align: center;
            align-items: center;
            height: 100%;
        }
        .t1{
            font-family: sans-serif;
            font-size: 20px;
            font-weight: 10;
        }
        .B1{
            padding: 15px;
            border-radius: 25px;
            width: 160px;
            background-color: rgb(59, 42, 34);
            text-align: center;
            color: white;
            justify-self: center;
            margin-top: 10%;
         }
         .B1:hover{
            background-color: brown;
         }  
         .D3{
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
         }
         .D1{
            height: 100%;
         }
        
    </style>
</head>
<body>
    <div id="h1"></div>

    <div class="content">
        <div class="D1">
            <div class="R2">
                <img src="Images/i1.avif" class="i1"></img>
            </div>
        </div>

       <div class="D2">
            <h1 class="t">Coffee Shop in your neighborhood</h1> 
            <h3 class="t1">Arabica & Music & People</h3>
            <div class="B1">Order Now</div>   
        </div>

        <div class="D3">
            <div class="R1"><img src="Images/i2.avif" class="i2"></img></div>
            <div class="d"><img src="Images/i3.avif" class="i3"></img></div>
        </div>
    </div>
    
    <div id="f1"></div>

    <script>
        $(document).ready(function(){
            $("#h1").load('Header.html')
            $("#f1").load('Footer.html')
        })
    </script>
</body>
</html>
