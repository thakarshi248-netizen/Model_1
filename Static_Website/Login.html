<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet"
        href="CSS/auth.css">

</head>

<body>

    <div class="auth-container">

        <div class="auth-box">

            <h1>Login</h1>

            <p class="sub-text">
                Login to continue
            </p>

            <form id="loginForm">

                <input type="email"
                    placeholder="Email Address"
                    required>

                <input type="password"
                    placeholder="Password"
                    required>

                <button type="submit">
                    Login
                </button>

            </form>

            <p class="bottom-text">

                Don't have account?

                <a href="register.html">
                    Register
                </a>

            </p>

        </div>

    </div>

    <script>

        const loginForm =
        document.getElementById("loginForm");

        loginForm.addEventListener("submit",function(e){

            e.preventDefault();

            alert("Login Successful!");

            // GO TO HOME PAGE

            window.location.href =
            "Index.html";

        });

    </script>

</body>

</html>
