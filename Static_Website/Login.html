<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet"
        href="CSS/auth.css">

</head>

<body>

    <div class="auth-container">

        <div class="auth-box">

            <h1>Login to Foody</h1>

            <p class="sub-text">
                Login to continue
            </p>

            <form id="loginForm">

                <input type="email"
                    id="loginEmail"
                    placeholder="Email Address">

                <input type="password"
                    id="loginPassword"
                    placeholder="Password">

                <button type="submit">
                    Login
                </button>

            </form>

            <p class="bottom-text">

                Don't have account?

                <a href="register.html">
                    Register
                </a>

            </p>

        </div>

    </div>

    <script>

        const loginForm =
        document.getElementById("loginForm");

        loginForm.addEventListener("submit",function(e){

            e.preventDefault();

            let email =
            document.getElementById("loginEmail").value;

            let password =
            document.getElementById("loginPassword").value;

            // EMAIL REGEX

            let emailPattern =
            /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

            // VALIDATION

            if(email === "" || password === ""){

                alert("All fields are required");

            }

            else if(!email.match(emailPattern)){

                alert("Enter valid email");

            }

            else if(password.length < 6){

                alert("Password must be minimum 6 characters");

            }

            else{

                alert("Login Successful!");

                window.location.href =
                "Index.html";
            }

        });

    </script>

</body>

</html>
