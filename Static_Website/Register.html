<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link rel="stylesheet"
        href="CSS/auth.css">

</head>

<body>

    <div class="auth-container">

        <div class="auth-box">

            <h1>Create Account</h1>

            <p class="sub-text">
                Register your account
            </p>

            <form id="registerForm">

                <input type="text"
                    placeholder="Full Name"
                    required>

                <input type="email"
                    placeholder="Email Address"
                    required>

                <input type="password"
                    placeholder="Password"
                    required>

                <input type="password"
                    placeholder="Confirm Password"
                    required>

                <button type="submit">
                    Register
                </button>

            </form>

            <p class="bottom-text">

                Already have account?

                <a href="login.html">
                    Login
                </a>

            </p>

        </div>

    </div>

    <script>

        const registerForm =
        document.getElementById("registerForm");

        registerForm.addEventListener("submit",function(e){

            e.preventDefault();

            alert("Registration Successful!");

            // GO TO LOGIN PAGE

            window.location.href =
            "login.html";

        });

    </script>

</body>

</html>
