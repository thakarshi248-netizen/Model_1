<html>
	<head>
		<title>Sample Website</title>
		<style>
			body{
				background-color: #2C3947;
			}
			table,th,td{
				border : 1px solid black;
			}
			.f1{
				display: flex;
				justify-content :center;
				margin : 25px;
			}
			h1{
				text-align : center;
				color: aliceblue;
			}
			.t1{
				background-color: #E8EDF2;
			}
			#submit,#reset{
				height: 35px;
				width: 100px;
				margin: 5px;
				border-radius: 10px;
				background-color: #2C3947;
				color: white;
				font-size: medium;
			}
			.d1{display: flex;justify-content: center;}
		</style>
	</head>
	<body>
		
		<h1>Registration Form</h1>
		<form class="f1">
			<table class="t1">
				<tr>
				</tr>
				<tr>
					<th>Name</th>
					<td><input type="text" placeholder="Enter Your Name" required></td>
				</tr>
				<tr>
					<th>DOB</th>
					<td><input type="date" required></td>
				</tr>
				<tr>
					<th>Phone</th>
					<td><input type="tel" placeholder="Enter Your Phone Number" required></td>
				</tr>
				<tr>
					<th>Email</th>
					<td><input type="email" placeholder="Enter Your Email" required></td>
				</tr>
				<tr>
					<th>Address</th>
					<td><textarea placeholder="Enter Your Address" required></textarea></td>
				</tr>
				<tr>
					<th>Select</th>
					<td>
						<select required>
							<option>Btech</option>
							<option>Mtech</option>
							<option>PHD</option>
						</select>
					</td>
				</tr>
				<tr>
					<th>Intrest</th>
					<td><label><input type="checkbox" value="Reading" >Reading</label><label><input type="checkbox" value="Writing" >Writing</label><label><input type="checkbox" value="Learning" >Learning</label></td>
				</tr>
				<tr>
					<th>Gender</th>
					<td><label><input type="radio" name="Gender" value="Male" required>Male</label><label><input type="radio" name="Gender" value="Female" required>Female</label></td>
				</tr>
				<tr>
					<th>Password</th>
					<td><input type="password" placeholder="Enter Your Password" required></td>
				</tr>
				<tr>
					<th>Color</th>
					<td><input type="color" required></td>
				</tr>
				<tr>
					<th>Range</th>
					<td><input type="range"  required></td>
				</tr>
				<tr>
					<th>File</th>
					<td><input type="file" required></td>
				</tr>
				<tr>
					<th>Image</th>
					<td><input type="image" src="https://colorhunt.co/img/color-hunt-logo-face.svg" required></td>
				</tr>
				<tr>
					<th>Search</th>
					<td><input type="search" required></td>
				</tr>
				<tr>
					<th>Time</th>
					<td><input type="time" required></td>
				</tr>
				
				
				<tr id="tr">

					<th colspan="2" id="th">
						<div class="d1">
							<input type="submit" id="submit" required>
							<input type="reset" id="reset" required>
						</div>
					</th>
				</tr>
			</table>
		</form>
	</body>
</html>
