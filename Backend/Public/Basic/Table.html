<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        table,th,td{
            border: 1px solid black;
            
        }
        body{
            display: flex;
            justify-content: center;
            padding: 25px;
        }
        td{
            padding: 25px;
        }
    </style>
</head>
<body>
    <table class="t">
        <tr>
            <td colspan="2">A</td>
            <td colspan="5">B</td>
        </tr>
        <tr>
            <td>C</td>
            <td>D</td>
            <td>E</td>
            <td align="Left">F</td>
            <td align="Left">G</td>
            <td align="Left">H</td>
            <td rowspan="3">J</td>
        </tr>
         <tr>
            <td rowspan="2">K</td>
            <td>M</td>
            <td colspan="2">N</td>
            <td colspan="2">I</td>
        </tr>
        <tr>
            <td>L</td>
            <td>P</td>
            <td>O</td>
            <td>I</td>
            <td>H</td>
        </tr>
    </table>
</body>
</html>
